<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login - SOS Mulher</title>
</head>
<body>
 
  <header>
    <a href="index.html">Voltar ao Manual</a>
  </header>


  <main>
    <section>
      <img src="../imagens/logo2.png" alt="Logo do site" width="250" height="200">
      <h2>Bem-vinda de Volta</h2>
      <p>Entre para acessar seu dispositivo.</p>

      <form>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com">

        <label for="senha">Senha:</label>
        <input type="password" id="senha" name="senha" placeholder="********">

        <button type="submit">Entrar</button>
      </form>

      <p><a href="#">Não tem conta? Cadastre-se</a></p>
      <p><a href="#">Esqueceu sua senha?</a></p>
    </section>
  </main>


  <footer>
    <p>Autoras: Samyra e Thamirys</p>
  </footer>
</body>
</html>
