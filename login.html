<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - SOS Mulher</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
 
  <header>
    <a href="index.html">Voltar ao Manual</a>
  </header>


  <main>
    <section class="login-box">
      <img src="imagens/logo.png" alt="Logo do site" width="250" height="200">
      <h2>Bem-vinda!</h2>
      <p>Entre para gerenciar seu dispositivo.</p>

      <form>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com">
        <button type="submit">Entrar</button>
      </form>
      <div class="links">
        <a href="#">Não tem conta? Cadastre-se</a>
      </div>     

      <script type="module">
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
        const supabase = createClient("https://jgpzexdccrheegmuriuc.supabase.co", "sb_publishable_MfUuutByxm1UeC7oE7RrqQ_ThauSqTW")

        document.querySelector("form").addEventListener("submit", async (e) => {
          e.preventDefault()
          const email = document.getElementById("email").value
          const { error } = await supabase.auth.signInWithOtp({ email })
          if (error) alert(error.message)
          else alert("Verifique seu e-mail para o link de acesso!")
        })
      </script>
    </section>
  </main>


  <footer>
    <p>Feito por Samyra e Thamirys</p>
  </footer>
</body>
</html>
