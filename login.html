<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Login/Cadastro - SOS Mulher</title>
</head>
<body>
 
  <header>
    <a href="index.html">Voltar ao Manual</a>
  </header>


  <main>
    <section>
      <img src="imagens/logo2.png" alt="Logo do site" width="250" height="200">
      <h2>Bem-vinda de Volta</h2>
      <p>Entre para acessar seu dispositivo.</p>

      <form>
        <label for="email">E-mail:</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com">
        <button type="submit">Entrar</button>
      </form>      

      <script type="module">
        import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm"
        const supabase = createClient("https://jgpzexdccrheegmuriuc.supabase.co", "sb_publishable_MfUuutByxm1UeC7oE7RrqQ_ThauSqTW")

        document.querySelector("form").addEventListener("submit", async (e) => {
          e.preventDefault()
          const email = document.getElementById("email").value
          const { error } = await supabase.auth.signInWithOtp({ email })
          if (error) alert(error.message)
          else alert("Verifique seu e-mail para o link de acesso!")
        })
      </script>
    </section>
  </main>


  <footer>
    <p>Autoras: Samyra e Thamirys</p>
  </footer>
</body>
</html>
